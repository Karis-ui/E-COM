[build]
  command = "python -m pip install --upgrade pip --disable-pip-version-check && python -m pip install -r requirements.txt --disable-pip-version-check"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK = "1"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200